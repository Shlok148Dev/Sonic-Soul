name: PSYCHE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt -r requirements-dev.txt
        pip install -e .

    - name: Code quality
      run: |
        black --check psyche-core/ psyche-api/
        isort --check-only psyche-core/ psyche-api/
        ruff check psyche-core/ psyche-api/

    - name: Type checking
      run: |
        mypy psyche-core/psyche/ --ignore-missing-imports

    - name: Run unit tests
      run: |
        pytest psyche-core/tests/unit/ -v --tb=short

    - name: Run integration tests
      run: |
        pytest psyche-core/tests/integration/ -v --tb=short
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
